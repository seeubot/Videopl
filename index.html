
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dual Split HLS Player</title>
    
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root {
            --plyr-color-main: #ffffff;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 60/40 Split Layout */
        .section-top {
            height: 60vh;
            width: 100vw;
            position: relative;
            border-bottom: 2px solid #222;
        }

        .section-bottom {
            height: 40vh;
            width: 100vw;
            position: relative;
            background: #050505;
        }

        /* Plyr container sizing */
        .plyr {
            width: 100%;
            height: 100%;
        }

        .plyr__video-wrapper {
            height: 100% !important;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Immersive vertical fit */
        }

        /* Ensure controls are visible and styled consistently on both sections */
        .plyr--full-ui {
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Top Player Section (60%) -->
    <div class="section-top" id="top-container">
        <video id="player-top" playsinline controls autoplay muted crossorigin>
            <source src="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <!-- Bottom Player Section (40%) -->
    <div class="section-bottom" id="bottom-container">
        <video id="player-bottom" playsinline controls autoplay muted crossorigin>
            <source src="https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <!-- Load Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.0"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

    <script>
        const setupPlayer = (videoId, src) => {
            const video = document.getElementById(videoId);
            
            // Standard control bar for both players
            const controls = [
                'play-large', 
                'play', 
                'progress', 
                'current-time', 
                'mute', 
                'volume', 
                'settings', 
                'fullscreen'
            ];

            const options = {
                autoplay: true,
                muted: true,
                controls: controls,
                settings: ['quality', 'speed'],
                ratio: null
            };

            if (!Hls.isSupported()) {
                const player = new Plyr(video, options);
                player.on('ready', () => player.play().catch(() => {}));
            } else {
                const hls = new Hls({ capLevelToPlayerSize: true });
                hls.loadSource(src);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    const availableQualities = hls.levels.map((l) => l.height);
                    options.quality = {
                        default: availableQualities[availableQualities.length - 1],
                        options: availableQualities,
                        forced: true,
                        onChange: (newQuality) => {
                            hls.levels.forEach((level, index) => {
                                if (level.height === newQuality) hls.currentLevel = index;
                            });
                        },
                    };
                    
                    const player = new Plyr(video, options);
                    player.on('ready', () => player.play().catch(() => {}));
                });
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Main Content Top
            setupPlayer('player-top', 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8');
            
            // Content Bottom
            setupPlayer('player-bottom', 'https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8');
        });
    </script>
</body>
</html>
